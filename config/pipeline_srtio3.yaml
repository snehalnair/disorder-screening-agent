pipeline:

  # ── LLM ───────────────────────────────────────────────────────────────────
  llm:
    provider: "anthropic"
    model: "claude-sonnet-4-6"

  # ── Stage 1: SMACT ─────────────────────────────────────────────────────────
  stage1_smact:
    exclude_elements:
      - He
      - Ne
      - Ar
      - Kr
      - Xe
      - Rn
      - Tc
      - Pm
      - Po
      - At
      - Fr
      - Ra
      - Ac
      - Pa
      - Np
      - Pu

  # ── Stage 2: Shannon radius ────────────────────────────────────────────────
  # Host: Ti4+ octahedral, r = 0.605 Å
  # 35% threshold: matches LiCoO2 config for consistency
  # Ti4+ is close to Co3+ (0.545 Å), so similar mismatch window
  stage2_radius:
    mismatch_threshold: 0.35
    tolerance_factor_max: 4.18      # Bartel τ — used for perovskites

  # ── Stage 3: Hautier-Ceder substitution probability ────────────────────────
  stage3_substitution:
    probability_threshold: 0.001

  # ── Stage 4 (ML pre-screen) ────────────────────────────────────────────────
  stage4_ml:
    enabled: false

  # ── Stage 5: SQS + MACE ────────────────────────────────────────────────────
  # 4×4×4 supercell of 5-atom primitive cell = 320 atoms
  # 64 Ti B-sites → 6-7 dopant atoms at 10%
  # Same number of target sites as LiCoO2 (64 Co sites) → matched comparison
  stage5_simulation:
    supercell: [4, 4, 4]
    concentrations: [0.10]
    n_sqs_realisations: 8
    potential: "mace-mp-0"
    device: "auto"
    fmax: 0.10                      # ordered baseline: tight convergence
    fmax_sqs: 0.15                  # SQS realisations: looser for speed
    max_relax_steps: 1000

  # ── Output ─────────────────────────────────────────────────────────────────
  output:
    top_n: 5
    include_ordered_comparison: true

  # ── Checkpointing ──────────────────────────────────────────────────────────
  checkpointing:
    backend: "sqlite"
    db_path: "checkpoints_srtio3.db"

  # ── Results database ───────────────────────────────────────────────────────
  database:
    local:
      path: "data/results_srtio3.db"

  # ── Routing ────────────────────────────────────────────────────────────────
  routing:
    max_candidates_after_stage1: 35
    max_retries: 2
    threshold_adjustment_pct: 0.20

  # ── Property weights ───────────────────────────────────────────────────────
  # SrTiO3 has no Li → voltage and li_ni_exchange are not applicable
  # Use formation_energy (stability) and volume_change (structural tolerance)
  # band_gap would be ideal but not yet implemented
  property_weights:
    voltage: 0.00
    formation_energy: 0.50
    li_ni_exchange: 0.00
    volume_change: 0.50
